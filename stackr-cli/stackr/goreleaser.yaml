version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/stackr
    binary: stackr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - format: binary
    name_template: >-
      stackr-{{ .Os }}-{{ .Arch }}
    overrides:
      - goos: windows
        format: binary
        name_template: stackr-windows

release:
  github:
    owner: stackr-lat
    name: cli
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
